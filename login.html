<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raandu Login</title>
<link rel="stylesheet" href="style.css">
<style>
.login-container{
    max-width:500px;
    margin:60px auto;
    padding:20px;
}
.login-card{
    background:white;
    border:3px solid #6b4423;
    padding:30px;
    box-shadow:10px 10px 0 rgba(107,68,35,0.15);
}
.logo-area{
    text-align:center;
    margin-bottom:25px;
}
.logo-area h1{
    color:#6b4423;
    font-size:3rem;
    letter-spacing:4px;
}
.logo-area p{
    color:#666;
    font-style:italic;
}
.login-btn{
    width:100%;
    padding:15px;
    background:#6b4423;
    color:white;
    border:none;
    cursor:pointer;
    font-size:16px;
    margin-top:10px;
}
.login-btn:hover{
    background:#54351b;
}
.links{
    text-align:center;
    margin-top:20px;
}
.links a{
    color:#6b4423;
    text-decoration:none;
    font-weight:bold;
}
.divider{
    text-align:center;
    margin:20px 0;
    color:#999;
}
</style>
</head>
<body>

<div class="pattern-top"></div>

<div class="login-container">

<div class="login-card">

<div class="logo-area">
<div style="font-size:60px;">🐂</div>
<h1>RAANDU</h1>
<p>The Digital Village of South Sudan</p>
</div>

<form>

<label>Email or Username</label>
<input type="text" placeholder="Enter your username or email" required>

<label>Password</label>
<input type="password" placeholder="Enter your password" required>

<button type="submit" class="login-btn">
Enter the Village
</button>

</form>

<div class="divider">
──────── OR ────────
</div>

<div class="links">
<p>
Don't have an account?
<a href="register.html">Join the Village</a>
</p>

<br>

<p>
<a href="#">Forgot Password?</a>
</p>
</div>

</div>

</div>

<div class="pattern-bottom"></div>

<script src="app.js"></script>

</body>
</html>
